<!DOCTYPE html>
<html> 
  <head>
    <title>insanity :p</title> 
  </head>
  <body>
  
    <canvas id="canvas"></canvas> 
    
  </body>

  <script src="https://cdn.jsdelivr.net/processing.js/1.4.8/processing.min.js"></script> 
  <script>
  var doodle = function(processingInstance) {
    with (processingInstance) {
      size(1500, 730); 
      background(255);
      var strkWg = 1;
      var strk = color(0);
            
		draw = function(){
			mouseDragged = function(){
				stroke(strk)
				if(mouseButton === RIGHT){
					strk = color(255);
				}
				strokeWeight(strkWg);
				line(pmouseX,pmouseY,mouseX,mouseY);
			}
			
			fill(255)
			stroke(0)
			strokeWeight(1)
			rect(5,42,41,33);
			rect(5,88,41,33);
			rect(5,140,41,33);
			
			fill(0);
			ellipse(25,170,strkWg,strkWg);
			
			fill(0)
			textSize(22);
			text("+",20,68);
			text("-",23,111);
			
			if(mouseX > 5 && mouseX < 5+41 && mouseY > 42 && mouseY < 42+33){
				cursor("pointer")
				mousePressed = function(){
					strkWg+=1;
				}
			}else{
				cursor("default")
			}
			
			if(mouseX > 5 && mouseX < 5+41 && mouseY > 88 && mouseY < 88+33){
				cursor("pointer")
				mousePressed = function(){
					strkWg-=1;
				}
			}
		}
    }};


  var canvas = document.getElementById("canvas"); 
  
  var processingInstance = new Processing(canvas, doodle); 
  </script>
</html>
