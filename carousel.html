<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="C:/TsFolder/MyPhotosAndStuff/jay.png" type="image/x-icon" />
</head>
  
  <style>
    body {
      font-family: 'Amatic SC', cursive;
    }
  </style>
  
<body>

<div class="container">
  <h2>Carousel Example</h2>
  <div id="myCarousel" class="carousel slide" data-ride="carousel">
    <!-- Indicators -->
    <ol class="carousel-indicators">
      <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
      <li data-target="#myCarousel" data-slide-to="1"></li>
      <li data-target="#myCarousel" data-slide-to="2"></li>
    </ol>

    <!-- Wrapper for slides -->
    <div class="carousel-inner">

      <div class="item active">
        <img src="https://i.pinimg.com/564x/c7/05/71/c70571fb85d71f1366e00d0b77a813cd.jpg" alt="Jay Walker" style="width:100%;">
        <div class="carousel-caption">
          <h3>Jay Walker</h3>
          <p>elemental powers- lightning.</p>
        </div>
      </div> 
 
      <div class="item">
        <img src="https://i.pinimg.com/564x/e7/41/07/e74107d9c0396625ec9821bf1c47b713.jpg" alt="The Green Ninja" style="width:100%;">
        <div class="carousel-caption">
          <h3>lloyd</h3>
          <p>The Green/Golden Ninja.</p>
        </div>
      </div>
    
      <div class="item">
        <img src="https://i.pinimg.com/236x/f4/ae/1b/f4ae1b69b9321691bee882833b809490.jpg" alt="Ninjas" style="width:100%;">
        <div class="carousel-caption">
          <h3>All the ninjas</h3>
          <p>The Ninjas</p>
        </div>
      </div>
      
      <div class="item">
        <img src="https://i.pinimg.com/564x/88/3e/0c/883e0c8013f9eda4243b40d80df12e9f.jpg" alt="Jay" style="width:100%;">
        <div class="carousel-caption">
          <h3>Cole</h3>
          <p>Cole Brookstone, elemental powers- earth</p>
        </div>
      </div>
    
    <!-- Left and right controls -->
    <a class="left carousel-control" href="#myCarousel" data-slide="prev">
      <span class="glyphicon glyphicon-chevron-left"></span>
      <span class="sr-only">Previous</span>
    </a>
    <a class="right carousel-control" href="#myCarousel" data-slide="next">
      <span class="glyphicon glyphicon-chevron-right"></span>
      <span class="sr-only">Next</span>
    </a>
  </div>
</div>

</body>
</html>
