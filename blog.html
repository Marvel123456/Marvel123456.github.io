<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>The Blogsite</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Ruluko&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">

        <style>
        
            h1{
                font-family: 'Aclonica', sans-serif;
                font-size:59px;
            }
        
            textarea{
                height:108px;
                width:222px;
            }
        
            body{
                text-align:center;
            }

            button{
                border-radius:10px;
                background:#3499B2;
                border:none;
                width:96px;
                height:39px;
                font-size:16px;
		font-family: 'Yomogi';
		color:white;
                box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.2);
            }
		
        </style>
        
        <style>
        
            @-webkit-keyframes fade{
                to{
                    opacity:3;
                }
                from{
                    opacity:0;
                }
            }
        
            ::-webkit-scrollbar {
                width: 10px;
            }
            ::-webkit-scrollbar-track {
                background:rgb(255, 255, 255);
            }
            ::-webkit-scrollbar-thumb:hover {
                background:rgb(0, 86, 191);
            }
            ::-webkit-scrollbar-thumb {
                background:rgb(0, 85, 255);
            }
        
            body{
                font-family: 'Yomogi', sans-serif;
                animation-name:fade;
                animation-duration:3.5s;
            }
            
            #nav{
                width:1700px;
                height:90px;
                background:rgb(0, 102, 255);
                position:fixed;
                left:0px;
                top:0;
                box-shadow: 3px 3px 5px 6px #ccc;
            }
            
            a{
                padding:14px;
                color:white;
                text-decoration:none;
            }
        

        </style>
    </head>
    <body>
	
        <div id='nav'><br><br>
            <a href='javascript:changePage(1);'>HOME</a>
            <a href='javascript:changePage(2);'>BLOG</a>
            <a href='javascript:changePage(3);'>READ POST</a>
        </div>
        
        <div class='page'>
            <br><br><br><br><br><br><br><br><br><br><br><br><h1>THE BLOGSITE</h1><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

        </div>
        <div class='page'>
        
<br><br><br><br><br><br><h3>Blog</h3><br><textarea required id='blog' placeholder="Blog post"></textarea><br><h3>Select your date:</h3><input required id='dateSelection' style='font-size:15px;' type='date'><br><button style="position:absolute;left:447px;top:246px" id='post'>Post</button>
                
            
        </div>
        <div class='page'>
            <br><br><br><br><br><br><h3>Blog</h3><br><div id='blogpost'><button onClick='localStorage.clear(); alert("Reload the program.")' style='position:absolute;left:16px;top:117px'>Delete all</button></div>

        </div>
         
        
    </body>
   
    <script>
	    
	    var page = document.getElementsByClassName('page');

            function changePage(index) {
                for ( var i = 0; i < page.length; i++ ) {

                    page[i].style.display = 'none';
                }
                page[index-1].style.display = 'block';
                window.scroll(0, 0);
            }
            changePage(1);
           
	    var info = localStorage.getItem("hmm") || "";
	    var postbox = document.getElementById("blog");
	    var button = document.getElementById("post");
	    var date = document.getElementById("dateSelection");
	    var div = document.getElementById("blogpost");
            var update = function() {
		    var items = info.split("☼");
		    div.innerHTML = "";
		    for(var i = 0; i < items.length-1; i++){
                    	div.innerHTML = div.innerHTML+'<div class = "message">'+items[i]+'</div>';
		    }
	    }
	    update();
            
            button.addEventListener("click", function(){
	    if(postbox.value !== ""){
                
                    info = info+"<h3>"+date.value+"</h3>"+postbox.value+"☼";
                    localStorage.setItem("hmm", info);
                    
                    info = localStorage.getItem("hmm");
                    postbox.value = "";
                    update();
                    
                }
            });
            
        </script>
</html>
