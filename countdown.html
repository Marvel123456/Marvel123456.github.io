<!DOCTYPE HTML>
<html>
<head>
<link rel="shortcut icon" href="https://post.healthline.com/wp-content/uploads/2020/08/10889-The_Watermelon_Diet_Fact_or_Fiction-_1200x628-facebook-1200x628.jpg" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Countdown</title>
    <style>

        a{
            text-decoration:none;
            font-family:trebuchet ms;
        }

        p {
          text-align: center;
          font-size: 90px;
          margin-top: 0px;
          font-family:impact;
          color:rgb(0, 149, 255);
          animation:fade 2.5s linear;
          -webkit-animation:fade 2s linear;
          -moz-animation:fade 2s linear;
          animation:changeS 5s infinite linear;
          -webkit-animation:changeS 5s infinite linear;
          -moz-animation:changeS 5s infinite linear;
}
        h1{
            font-size:44px;
            font-family:impact;
            color:rgb(0, 183, 255);
            text-align:center;
            animation:fade 1s linear;
            -webkit-animation:fade 1s linear;
            -moz-animation:fade 1s linear;
        }

    </style>
    </head>
<body>

<h1></h1>
<p id="countDown"></p>
<a target="_blank" href='https://www.google.com/search?q=days+into+months&rlz=1C1SQJL_enIN905IN905&oq=days+into+mo&aqs=chrome.0.0i457j69i57j0l6.3202j0j7&sourceid=chrome&ie=UTF-8'>conversion</a>
<script>
var countDownDate = new Date("jan 22, 2021").getTime();
var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);
  document.getElementById("countDown").innerHTML = days + "d " + hours + "h "
  + minutes + "m " + seconds + "s ";
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countDown").innerHTML = "Go read those books!";
  }
}, 1000);
</script>

</body>
</html>
